<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Station Alpha - Laboratory Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(202, 100%, 70%, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(38, 100%, 50%, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sparkline {
            width: 100%;
            height: 40px;
            stroke: #22d3ee;
            stroke-width: 2;
            fill: none;
            opacity: 0.3;
        }
        .sparkline-critical {
            stroke: #ef4444;
            opacity: 0.6;
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.1); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.4); }
        }
        .critical-node {
            animation: pulse-red 2s infinite;
            border-color: rgba(239, 68, 68, 0.4) !important;
        }
    </style>
</head>
<body class="p-8">
    <!-- Emergency Lockout Overlay -->
    <div id="emergency-overlay" class="fixed inset-0 z-50 bg-red-900/60 backdrop-blur-xl flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-500">
        <div class="glass bg-black/60 p-16 rounded-[50px] border-red-500/50 text-center shadow-2xl">
            <div class="w-24 h-24 bg-red-500 rounded-full flex items-center justify-center mx-auto mb-8 animate-ping">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m0 0v3m0-3h3m-3 0H9m12-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-7xl font-black tracking-tighter text-red-500 mb-4 uppercase">SYSTEM INHIBITED</h1>
            <p class="text-white/60 tracking-widest uppercase text-lg font-bold">Emergency Stop Command Executed</p>
            <button onclick="toggleEmergency(false)" class="mt-12 px-12 py-4 rounded-3xl bg-white/10 hover:bg-white/20 border border-white/20 text-white text-sm font-black uppercase tracking-widest transition-all">Reset Interlocks</button>
        </div>
    </div>

    <div class="max-w-[1750px] mx-auto grid grid-cols-12 gap-10">
        <!-- Persistent Control Sidebar -->
        <aside class="col-span-3 h-[calc(100vh-64px)] sticky top-8 flex flex-col">
            <div class="flex items-center gap-5 mb-16">
                <div class="p-4 rounded-[24px] bg-cyan-500/20 border border-cyan-500/20 shadow-[0_0_20px_rgba(34,211,238,0.2)]">
                    <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-light tracking-tight leading-none">Research <span class="font-black text-cyan-400">Alpha</span></h1>
                    <p class="text-white/40 text-[10px] uppercase tracking-[0.3em] font-black mt-2">Station Master Console</p>
                </div>
            </div>

            <!-- AI Fuel / Model Credits -->
            <div class="bg-white/5 border border-white/10 rounded-[40px] p-8 mb-8">
                <h3 class="text-[10px] uppercase text-white/30 mb-6 font-black tracking-[0.3em] flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-violet-500"></div> AI Resource Balance
                </h3>
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-[11px] mb-2">
                            <span class="text-white/60 uppercase font-bold tracking-tighter">Gemini 3 Flash</span>
                            <span class="text-cyan-400 font-black">94%</span>
                        </div>
                        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-cyan-500 to-blue-400" style="width: 94%"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] mb-2">
                            <span class="text-white/60 uppercase font-bold tracking-tighter">Claude 4.6 Audit</span>
                            <span class="text-emerald-400 font-black">72%</span>
                        </div>
                        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-emerald-500 to-teal-400" style="width: 72%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- System Trend Analytics -->
            <div class="bg-white/5 border border-white/10 rounded-[40px] p-8 mb-8 flex-1 flex flex-col overflow-hidden">
                <h3 class="text-[10px] uppercase text-white/30 mb-8 font-black tracking-[0.3em] flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div> Total Station Load (W)
                </h3>
                <div class="flex-1 flex items-end">
                    <svg viewBox="0 0 100 40" class="w-full h-full min-h-[160px]">
                        <defs>
                            <linearGradient id="trendGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="5%" stop-color="#22d3ee" stop-opacity="0.3"/>
                                <stop offset="95%" stop-color="#22d3ee" stop-opacity="0"/>
                            </linearGradient>
                        </defs>
                        <path fill="url(#trendGradient)" stroke="#22d3ee" stroke-width="2" d="M0,40 L0,25 Q15,20 30,30 T60,15 T100,20 L100,40 Z" />
                    </svg>
                </div>
            </div>

            <!-- Global Kill Switch -->
            <button onclick="toggleEmergency(true)" class="w-full py-5 rounded-[32px] bg-red-500/10 border border-red-500/30 text-red-500 text-xs font-black uppercase tracking-[0.3em] hover:bg-red-500/20 transition-all flex items-center justify-center gap-4 shadow-[0_0_30px_rgba(239,68,68,0.15)] group">
                <div class="w-3 h-3 bg-red-500 rounded-full group-hover:animate-ping"></div>
                Emergency Stop
            </button>
        </aside>

        <!-- Node Grid -->
        <main class="col-span-9">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="nodes-grid">
                <!-- Node Cards dynamically generated -->
            </div>
        </main>
    </div>

    <script>
        function toggleEmergency(active) {
            const overlay = document.getElementById('emergency-overlay');
            if(active) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 500);
            }
        }

        const nodes = Array.from({ length: 10 }, (_, i) => ({
            id: i + 1,
            kv: 0.5 + (Math.random() * 0.1),
            status: i === 0 || Math.random() > 0.1 ? 'online' : 'offline',
            fault: Math.random() > 0.95
        }));

        const grid = document.getElementById('nodes-grid');
        nodes.forEach(node => {
            const card = document.createElement('div');
            card.className = `relative overflow-hidden glass rounded-[44px] p-8 border transition-all duration-700 hover:scale-[1.02] ${node.fault ? 'critical-node' : 'border-white/10'}`;
            
            const pct = ((node.kv - 0.5) / (3.0 - 0.5)) * 100;
            const dashArray = 251; 
            const offset = 125 - (125 * (pct / 100));

            card.innerHTML = `
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h3 class="text-[9px] uppercase tracking-[0.4em] text-white/20 font-black mb-1">Station Unit</h3>
                        <div class="flex items-center gap-4">
                            <span class="text-4xl font-black tracking-tighter italic">0${node.id}</span>
                            <div class="flex gap-1.5">
                                <div class="w-1.5 h-1.5 rounded-full ${node.status === 'online' ? (node.fault ? 'bg-red-500 animate-ping' : 'bg-emerald-500 shadow-[0_0_10px_#10b981]') : 'bg-white/5'}"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-3.5 rounded-[20px] border ${node.fault ? 'bg-red-500/20 border-red-500/40 text-red-400' : 'bg-white/5 border-white/10 text-white/20'}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    </div>
                </div>

                <div class="relative flex flex-col items-center justify-center mb-12">
                    <svg viewBox="0 0 100 60" class="w-full max-w-[240px] drop-shadow-[0_0_20px_rgba(34,211,238,0.1)]">
                        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="12" stroke-linecap="round"/>
                        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="${node.fault ? '#ef4444' : '#22d3ee'}" stroke-width="12" stroke-linecap="round" style="stroke-dasharray: 125; stroke-dashoffset: ${offset}; transition: stroke-dashoffset 1s ease-out"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pt-8">
                        <span class="text-6xl font-black tracking-tighter leading-none ${node.fault ? 'text-red-400' : 'text-white'}">${node.kv.toFixed(2)}</span>
                        <span class="text-[10px] uppercase tracking-[0.3em] text-white/20 font-black mt-3 italic">kV Live</span>
                    </div>
                    <div class="absolute bottom-1 w-full h-10 px-16 opacity-30">
                        <svg class="w-full h-full" viewBox="0 0 100 20">
                            <polyline points="0,10 10,12 20,8 30,15 40,5 50,10 60,12 70,8 80,10 90,5 100,10" fill="none" stroke="${node.fault ? '#ef4444' : '#22d3ee'}" stroke-width="2"/>
                        </svg>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div class="glass bg-white/[0.01] p-4 rounded-[24px] border border-white/5">
                        <span class="text-[9px] uppercase tracking-[0.2em] text-white/20 font-black block mb-1">Current</span>
                        <span class="text-base font-black">${(Math.random() * 80).toFixed(1)} <span class="text-[10px] text-white/30">mA</span></span>
                    </div>
                    <div class="glass bg-white/[0.01] p-4 rounded-[24px] border border-white/5">
                        <span class="text-[9px] uppercase tracking-[0.2em] text-white/20 font-black block mb-1">Power</span>
                        <span class="text-base font-black">${(Math.random() * 4).toFixed(1)} <span class="text-[10px] text-white/30">W</span></span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
