<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Station Alpha | Radboud University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #1d1d1b;
        }
        .ru-red { color: #be2c2e; }
        .bg-ru-red { background-color: #be2c2e; }
        .border-ru-red { border-color: #be2c2e; }
        
        .ru-card {
            background: white;
            border: 1px solid #e5e5e5;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ru-card:hover {
            border-color: #be2c2e;
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        .ru-heading {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Institutional Header -->
    <header class="bg-white border-b border-gray-200 px-12 py-10 shadow-sm">
        <div class="max-w-[1700px] mx-auto flex justify-between items-end">
            <div class="flex items-center gap-10">
                <div class="w-20 h-20 bg-ru-red flex items-center justify-center text-white shadow-lg shadow-red-900/10">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-5xl ru-heading ru-red leading-none">Research Station <span class="text-black">Alpha</span></h1>
                    <p class="text-[11px] uppercase tracking-[0.5em] font-black mt-3 text-gray-400">Faculty of Science • Radboud University</p>
                </div>
            </div>
            <div class="flex items-center gap-8">
                <div class="text-right">
                    <span class="text-[10px] uppercase font-black text-gray-300 tracking-widest block mb-1">Station Status</span>
                    <div class="flex items-center gap-2 justify-end">
                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
                        <span class="font-bold text-sm uppercase tracking-tighter">Operational</span>
                    </div>
                </div>
                <button class="bg-ru-red text-white px-10 py-4 font-black text-xs uppercase tracking-[0.2em] hover:bg-red-800 transition-all flex items-center gap-3 shadow-lg shadow-red-900/20">
                    Emergency Stop <span class="text-lg">→</span>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-[1700px] mx-auto grid grid-cols-12 gap-12 p-12">
        <!-- Sidebar -->
        <aside class="col-span-3">
            <!-- Infrastructure Health -->
            <div class="ru-card p-8 mb-8">
                <h3 class="text-[10px] uppercase text-ru-red mb-6 font-black tracking-[0.3em] flex items-center gap-3">
                    <div class="w-2 h-2 bg-ru-red"></div> Infrastructure Health
                </h3>
                <div class="space-y-6">
                    <div class="flex justify-between items-end">
                        <div class="flex flex-col">
                            <span class="text-[9px] uppercase text-gray-400 font-black mb-1 tracking-widest">UPS Battery</span>
                            <span class="text-3xl font-black ru-red">26.4 <span class="text-sm">V</span></span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] uppercase text-gray-400 font-black mb-1 tracking-widest">Lab Temp</span>
                            <span class="text-3xl font-black text-black">42.8°C</span>
                        </div>
                    </div>
                    <div class="h-2 w-full bg-gray-100 overflow-hidden">
                        <div class="h-full bg-ru-red" style="width: 88%"></div>
                    </div>
                </div>
            </div>

            <!-- Trend Analytic -->
            <div class="ru-card p-8">
                <h3 class="text-[10px] uppercase text-ru-red mb-8 font-black tracking-[0.3em] flex items-center gap-3">
                    <div class="w-2 h-2 bg-ru-red"></div> System Load Trend
                </h3>
                <div class="h-40 flex items-end gap-1">
                    <div class="flex-1 bg-gray-100 h-[40%]"></div>
                    <div class="flex-1 bg-gray-100 h-[60%]"></div>
                    <div class="flex-1 bg-gray-200 h-[80%]"></div>
                    <div class="flex-1 bg-ru-red h-[50%]"></div>
                    <div class="flex-1 bg-black h-[90%]"></div>
                    <div class="flex-1 bg-ru-red h-[70%]"></div>
                </div>
            </div>
        </aside>

        <!-- Node Grid -->
        <main class="col-span-9">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10" id="nodes-grid">
                <!-- Node Cards -->
            </div>
        </main>
    </div>

    <script>
        const grid = document.getElementById('nodes-grid');
        for(let i=1; i<=6; i++) {
            const isFault = i === 3;
            const kv = isFault ? 3.12 : (0.5 + Math.random()*0.1).toFixed(2);
            const card = document.createElement('div');
            card.className = `ru-card flex flex-col ${isFault ? 'border-ru-red border-2 ring-8 ring-red-500/5' : ''}`;
            card.innerHTML = `
                <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center">
                    <div>
                        <span class="text-[9px] uppercase font-black text-gray-400 tracking-widest block mb-1">Laboratory Unit</span>
                        <h3 class="text-2xl font-black text-black uppercase">Unit-0${i}</h3>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-black uppercase text-emerald-600 mb-1">Active</span>
                        <div class="w-3 h-3 ${isFault ? 'bg-ru-red animate-pulse' : 'bg-emerald-500'}"></div>
                    </div>
                </div>
                <div class="p-12 flex flex-col items-center justify-center bg-gray-50/50">
                    <div class="relative mb-6">
                        <span class="text-8xl font-black tracking-tighter leading-none ${isFault ? 'ru-red' : 'text-black'}">${kv}</span>
                        <span class="absolute -right-12 bottom-2 text-2xl font-bold ru-red">kV</span>
                    </div>
                    <div class="w-full h-3 bg-gray-200 mb-3">
                        <div class="h-full ${isFault ? 'bg-ru-red' : 'bg-black'}" style="width: ${((kv-0.5)/2.5)*100}%"></div>
                    </div>
                    <div class="flex justify-between w-full text-[9px] uppercase font-black text-gray-400 tracking-widest">
                        <span>0.50 kV</span>
                        <span>3.00 kV</span>
                    </div>
                </div>
                <div class="p-8 grid grid-cols-2 gap-8 border-t border-gray-100">
                    <div>
                        <p class="text-[9px] uppercase font-black text-gray-400 mb-2 tracking-widest">Power Load</p>
                        <p class="text-xl font-black">12.4 <span class="text-xs text-gray-300">W</span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] uppercase font-black text-gray-400 mb-2 tracking-widest">PoE Source</p>
                        <p class="text-xl font-black">48.2 <span class="text-xs text-gray-300">V</span></p>
                    </div>
                </div>
                <div class="px-8 py-4 flex items-center justify-between group cursor-pointer ${isFault ? 'bg-ru-red text-white' : 'hover:bg-gray-50'}">
                    <span class="text-[10px] font-black uppercase tracking-widest">
                        ${isFault ? 'SAFETY INTERLOCK ACTIVE' : 'DIAGNOSTICS NOMINAL'}
                    </span>
                    <span class="font-bold group-hover:translate-x-1 transition-transform">→</span>
                </div>
            `;
            grid.appendChild(card);
        }
    </script>
</body>
</html>
