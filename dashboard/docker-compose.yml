version: '3.8'

services:
  # Premium Master Dashboard
  dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODES_CONFIG=/app/config/nodes.json
    volumes:
      - ./config:/app/config
    restart: unless-stopped

  # Home Assistant for automation and long-term logging
  homeassistant:
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./ha-config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    network_mode: host

  # RustDesk Relay (Self-Hosted)
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: hbbs
    command: hbbs
    network_mode: host
    volumes:
      - ./rustdesk-data:/root
    restart: unless-stopped

  hbr:
    image: rustdesk/rustdesk-server:latest
    container_name: hbr
    command: hbr
    network_mode: host
    volumes:
      - ./rustdesk-data:/root
    restart: unless-stopped
